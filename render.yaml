services:
  # ── Flask Backend ──────────────────────────────────────────────────────────
  - type: web
    name: yathrava-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: JWT_SECRET
        generateValue: true          # Render auto-generates a secure random value
      - key: MONGODB_URI
        sync: false                  # Set this manually in Render dashboard (MongoDB Atlas URI)
      - key: FLASK_ENV
        value: production

  # ── React / Vite Frontend ──────────────────────────────────────────────────
  - type: web
    name: yathrava-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false                  # Set to your backend URL, e.g. https://yathrava.onrender.com/api
